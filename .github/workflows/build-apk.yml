name: Build WebView APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.1'

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore keystore.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias nawaqes -storepass nawaqes123 -keypass nawaqes123 \
            -dname "CN=Nawaqes, OU=App, O=Nawaqes, L=Cairo, ST=Cairo, C=EG"

      - name: Build Signed APK
        run: gradle assembleRelease --no-daemon -x lint

      - name: Find APK
        run: find . -name "*.apk" -type f

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nawaqes-webview-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
